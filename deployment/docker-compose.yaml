version: "1.2"

services:
  redis:
    image: redis:alpine
    container_name: redis
  bookmark_service:
    image: dungi3/golang-learn-bookmark_service:latest
    build: .
    container_name: bookmark_service
    depends_on:
      - redis

  portal:
    image: ebvn/bookmark-app-portal:mono
    container_name: portal

  nginx: 
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:Z

    depends_on:
      - portal
      - bookmark_service
