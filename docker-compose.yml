version: "1.1"

services: 
  redis: 
    image: redis:alpine
    container_name: redis
    environment:
      - REDIS_PASSWORD=my-secret-password
    ports:
      - 6379:6379
  bookmark_service: 
    image: dungi3/golang-learn-bookmark_service:latest
    build: .
    container_name: bookmark_service
    depends_on:
     - redis
    ports:
      - 8080:8080
    environment: 
      - REDIS_ADDR=redis:6379
      - SERVICE_NAME=bookmark_service
      - APP_PORT=8080
      - INSTANCE_ID=instance_01
      - REDIS_PWD=my-secret-password
